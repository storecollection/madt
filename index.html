public class SplashActivity extends AppCompatActivity {

			package com.example.studentdb;

import android.content.ContentValues;
import android.content.Context;
import android.database.Cursor;
import android.database.sqlite.SQLiteDatabase;
import android.database.sqlite.SQLiteOpenHelper;

public class DBHelper extends SQLiteOpenHelper {

    public DBHelper(Context context) {
        super(context, "StudentDB", null, 1);
    }

    @Override
    public void onCreate(SQLiteDatabase db) {

        db.execSQL("CREATE TABLE Student(" +
                "roll_no INTEGER PRIMARY KEY," +
                "name TEXT," +
                "address TEXT," +
                "percentage REAL)");
    }

    @Override
    public void onUpgrade(SQLiteDatabase db,
                          int oldVersion,
                          int newVersion) {

        db.execSQL("DROP TABLE IF EXISTS Student");
        onCreate(db);
    }

    // Insert Record
    public void insertStudent(int roll,
                              String name,
                              String address,
                              float per) {

        SQLiteDatabase db = this.getWritableDatabase();

        ContentValues cv = new ContentValues();

        cv.put("roll_no", roll);
        cv.put("name", name);
        cv.put("address", address);
        cv.put("percentage", per);

        db.insert("Student", null, cv);
    }

    // Show Records
    public Cursor getStudents() {

        SQLiteDatabase db = this.getReadableDatabase();

        return db.rawQuery("SELECT * FROM Student", null);
    }
}

public class MainActivity extends AppCompatActivity {

        setContentView(R.layout.activity_main);

        btnShow = findViewById(R.id.btnShow);
        txtResult = findViewById(R.id.txtResult);

        db = new DBHelper(this);

        // Insert 5 records
        btnInsert.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                db.insertStudent(1,"Rahul","Nashik",85);
                db.insertStudent(2,"Amit","Pune",78);
                db.insertStudent(3,"Sneha","Mumbai",90);
                db.insertStudent(4,"Pooja","Nagar",88);
                db.insertStudent(5,"Rohit","Satara",75);

                txtResult.setText("5 Records Inserted");
            }

        // Show records
        btnShow.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                Cursor c = db.getStudents();

                String data = "";

                while(c.moveToNext()) {

                    data += "Roll No : "

                    data += "Name : "
                            + c.getString(1) + "\n";

                    data += "Address : "
                            + c.getString(2) + "\n";

                    data += "Percentage : "
                            + c.getFloat(3) + "\n\n";

                txtResult.setText(data);

			package com.example.perfectnumber;

import androidx.appcompat.app.AppCompatActivity;

import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.EditText;
import android.widget.Toast;

public class MainActivity extends AppCompatActivity {

    EditText etNumber;
    Button btnCheck;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etNumber = findViewById(R.id.etNumber);
        btnCheck = findViewById(R.id.btnCheck);

        btnCheck.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                int num = Integer.parseInt(
                        etNumber.getText().toString());

                int sum = 0;

                for(int i=1; i<num; i++) {

                    if(num % i == 0) {
                        sum = sum + i;
                    }
                }

                if(sum == num) {

                    Toast.makeText(
                            MainActivity.this,
                            num + " is Perfect Number",
                            Toast.LENGTH_LONG).show();
                }
                else {

                    Toast.makeText(
                            MainActivity.this,
                            num + " is Not Perfect Number",
                            Toast.LENGTH_LONG).show();
                }
            }
        });
    }
}

import androidx.appcompat.app.AppCompatActivity;

import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.EditText;
import android.widget.TextView;

public class MainActivity extends AppCompatActivity {

    EditText etNumber;
    Button btnCheck;
    TextView txtResult;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etNumber = findViewById(R.id.etNumber);
        btnCheck = findViewById(R.id.btnCheck);
        txtResult = findViewById(R.id.txtResult);

        btnCheck.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                int num = Integer.parseInt(
                        etNumber.getText().toString());

                int original = num;
                int rem, sum = 0;

                while(num > 0) {

                    rem = num % 10;

                    sum = sum + (rem * rem * rem);

                    num = num / 10;
                }

                if(sum == original) {

                    txtResult.setText(
                            original + " is Armstrong Number");
                }
                else {

                    txtResult.setText(
                            original + " is Not Armstrong Number");
                }
            }
        });
    }
}

		package com.example.imageswitcher;

import androidx.appcompat.app.AppCompatActivity;

import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.ImageSwitcher;
import android.widget.ImageView;
import android.widget.ViewSwitcher;

public class MainActivity extends AppCompatActivity {

    ImageSwitcher imageSwitcher;
    Button btnNext;

    int images[] = {
            R.drawable.img1,
            R.drawable.img2,
            R.drawable.img3
    };

    int index = 0;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        imageSwitcher = findViewById(R.id.imageSwitcher);
        btnNext = findViewById(R.id.btnNext);

        // setFactory()
        imageSwitcher.setFactory(new ViewSwitcher.ViewFactory() {
            @Override
            public View makeView() {

                ImageView imageView =
                        new ImageView(getApplicationContext());

                imageView.setScaleType(
                        ImageView.ScaleType.FIT_CENTER);

                imageView.setLayoutParams(
                        new ImageSwitcher.LayoutParams(
                                300,
                                300));

                return imageView;
            }
        });

        // First image
        imageSwitcher.setImageResource(images[index]);

        btnNext.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                index++;

                if(index == images.length) {
                    index = 0;
                }

                imageSwitcher.setImageResource(
                        images[index]);
            }
        });
    }
}

    protected void onCreate(Bundle savedInstanceState) {

        setContentView(R.layout.activity_main);

        btnAlert = findViewById(R.id.btnAlert);

        btnAlert.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                AlertDialog.Builder builder =
                        new AlertDialog.Builder(MainActivity.this);

                builder.setTitle("Alert Dialog");

                builder.setMessage(
                        "Do you want to exit?");

                builder.setPositiveButton(
                        "YES",

                        new DialogInterface.OnClickListener() {

	package com.example.textformat;

import androidx.appcompat.app.AppCompatActivity;

import android.graphics.Color;
import android.graphics.Paint;
import android.graphics.Typeface;
import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.CheckBox;
import android.widget.EditText;
import android.widget.RadioButton;
import android.widget.TextView;

public class MainActivity extends AppCompatActivity {

    EditText etName;
    TextView txtMessage;

    RadioButton rbRed, rbBlue, rbGreen;

    CheckBox cbBold, cbItalic, cbUnderline;

    Button btnDisplay, btnClear, btnExit;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etName = findViewById(R.id.etName);

        txtMessage = findViewById(R.id.txtMessage);

        rbRed = findViewById(R.id.rbRed);
        rbBlue = findViewById(R.id.rbBlue);
        rbGreen = findViewById(R.id.rbGreen);

        cbBold = findViewById(R.id.cbBold);
        cbItalic = findViewById(R.id.cbItalic);
        cbUnderline = findViewById(R.id.cbUnderline);

        btnDisplay = findViewById(R.id.btnDisplay);
        btnClear = findViewById(R.id.btnClear);
        btnExit = findViewById(R.id.btnExit);

        // Display Button

        btnDisplay.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                String name =
                        etName.getText().toString();

                txtMessage.setText(
                        "Welcome " + name);

                // Change Color

                if(rbRed.isChecked()) {

                    txtMessage.setTextColor(
                            Color.RED);
                }

                if(rbBlue.isChecked()) {

                    txtMessage.setTextColor(
                            Color.BLUE);
                }

                if(rbGreen.isChecked()) {

                    txtMessage.setTextColor(
                            Color.GREEN);
                }

                // Bold + Italic

                if(cbBold.isChecked() &&
                        cbItalic.isChecked()) {

                    txtMessage.setTypeface(
                            null,
                            Typeface.BOLD_ITALIC);
                }

                else if(cbBold.isChecked()) {

                    txtMessage.setTypeface(
                            null,
                            Typeface.BOLD);
                }

                else if(cbItalic.isChecked()) {

                    txtMessage.setTypeface(
                            null,
                            Typeface.ITALIC);
                }

                else {

                    txtMessage.setTypeface(
                            null,
                            Typeface.NORMAL);
                }

                // Underline

                if(cbUnderline.isChecked()) {

                    txtMessage.setPaintFlags(
                            txtMessage.getPaintFlags()
                                    | Paint.UNDERLINE_TEXT_FLAG);
                }
            }
        });

        // Clear Button

        btnClear.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                etName.setText("");
                txtMessage.setText("");

                cbBold.setChecked(false);
                cbItalic.setChecked(false);
                cbUnderline.setChecked(false);
            }
        });

        // Exit Button

        btnExit.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                finish();
            }
        });
    }
}

import androidx.appcompat.app.AppCompatActivity;

import android.os.Handler;
import android.view.View;
import android.widget.Button;
import android.widget.ProgressBar;
import android.widget.TextView;

public class MainActivity extends AppCompatActivity {

    ProgressBar progressBar;
    Button btnStart;
    TextView txtProgress;

    int progressStatus = 0;

    Handler handler = new Handler();

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        progressBar = findViewById(R.id.progressBar);

        btnStart = findViewById(R.id.btnStart);

        txtProgress = findViewById(R.id.txtProgress);

        btnStart.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                progressStatus = 0;

                new Thread(new Runnable() {
                    @Override
                    public void run() {

                        while(progressStatus < 100) {

                            progressStatus += 10;

                            handler.post(new Runnable() {
                                @Override
                                public void run() {

                                    progressBar.setProgress(
                                            progressStatus);

                                    txtProgress.setText(
                                            progressStatus + "%");
                                }
                            });

                            try {

                                Thread.sleep(500);

                            } catch (InterruptedException e) {

                                e.printStackTrace();
                            }
                        }
                    }
                }).start();
            }
        });
    }
}

public class DBHelper extends SQLiteOpenHelper {

    public DBHelper(Context context) {

        super(context,
                "EmployeeDB",
                null,
                1);
    }

    @Override
    public void onCreate(SQLiteDatabase db) {

        db.execSQL(
                "CREATE TABLE Employee(" +
                        "E_id INTEGER PRIMARY KEY," +
                        "name TEXT," +
                        "address TEXT," +
                        "ph_no TEXT)");
    }

    @Override
    public void onUpgrade(SQLiteDatabase db,
                          int oldVersion,
                          int newVersion) {

        db.execSQL(
                "DROP TABLE IF EXISTS Employee");

        onCreate(db);
    }

    // Insert Record

    public void insertEmployee(int id,
                               String name,
                               String address,
                               String phone) {

        SQLiteDatabase db =
                this.getWritableDatabase();

        ContentValues cv =
                new ContentValues();

        cv.put("E_id", id);
        cv.put("name", name);
        cv.put("address", address);
        cv.put("ph_no", phone);

        db.insert("Employee",
                null,
                cv);
    }

    // Show Records

    public Cursor getEmployees() {

        SQLiteDatabase db =
                this.getReadableDatabase();

        return db.rawQuery(
                "SELECT * FROM Employee",
                null);
    }
}

import androidx.appcompat.app.AppCompatActivity;

import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.EditText;
import android.widget.TextView;

public class MainActivity extends AppCompatActivity {

    EditText getnum;
    Button btnCheck;
    TextView txtResult;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        getnum = findViewById(R.id.getnum);

        btnCheck = findViewById(R.id.btnCheck);

        txtResult = findViewById(R.id.txtResult);

        btnCheck.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                int num = Integer.parseInt(
                        getnum.getText().toString());

                int temp = num;
                int rev = 0;

                while(num > 0) {

                    int rem = num % 10;

                    rev = rev * 10 + rem;

                    num = num / 10;
                }

                if(temp == rev) {

                    txtResult.setText(
                            temp + " is Palindrome");
                }

                else {

                    txtResult.setText(
                            temp + " is Not Palindrome");
                }
            }
        });
    }
}

package com.example.stringoperation;

import androidx.appcompat.app.AppCompatActivity;

import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.EditText;
import android.widget.RadioButton;
import android.widget.TextView;

public class MainActivity extends AppCompatActivity {

    EditText etString;

    RadioButton rbLength,
            rbUpper,
            rbLower,
            rbReverse;

    Button btnPerform;

    TextView txtResult;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etString = findViewById(R.id.etString);

        rbLength = findViewById(R.id.rbLength);
        rbUpper = findViewById(R.id.rbUpper);
        rbLower = findViewById(R.id.rbLower);
        rbReverse = findViewById(R.id.rbReverse);

        btnPerform = findViewById(R.id.btnPerform);

        txtResult = findViewById(R.id.txtResult);

        btnPerform.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                String str =
                        etString.getText().toString();

                // String Length

                if(rbLength.isChecked()) {

                    txtResult.setText(
                            "Length = "
                                    + str.length());
                }

                // Uppercase

                else if(rbUpper.isChecked()) {

                    txtResult.setText(
                            str.toUpperCase());
                }

                // Lowercase

                else if(rbLower.isChecked()) {

                    txtResult.setText(
                            str.toLowerCase());
                }

                // Reverse String

                else if(rbReverse.isChecked()) {

                    String rev = "";

                    for(int i = str.length()-1;
                        i >= 0;
                        i--) {

                        rev = rev + str.charAt(i);
                    }

                    txtResult.setText(
                            rev);
                }
            }
        });
    }
}

package com.example.textformat;

import androidx.appcompat.app.AppCompatActivity;

import android.graphics.Color;
import android.graphics.Paint;
import android.graphics.Typeface;
import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.CheckBox;
import android.widget.EditText;
import android.widget.RadioButton;
import android.widget.TextView;

public class MainActivity extends AppCompatActivity {

    EditText etName;

    TextView txtMessage;

    RadioButton rbRed,
            rbBlue,
            rbGreen;

    CheckBox cbBold,
            cbItalic,
            cbUnderline;

    Button btnDisplay,
            btnClear,
            btnExit;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etName = findViewById(R.id.etName);

        txtMessage = findViewById(R.id.txtMessage);

        rbRed = findViewById(R.id.rbRed);
        rbBlue = findViewById(R.id.rbBlue);
        rbGreen = findViewById(R.id.rbGreen);

        cbBold = findViewById(R.id.cbBold);
        cbItalic = findViewById(R.id.cbItalic);
        cbUnderline = findViewById(R.id.cbUnderline);

        btnDisplay = findViewById(R.id.btnDisplay);
        btnClear = findViewById(R.id.btnClear);
        btnExit = findViewById(R.id.btnExit);

        // Display Button

        btnDisplay.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                String name =
                        etName.getText().toString();

                txtMessage.setText(
                        "Welcome " + name);

                // Change Color

                if(rbRed.isChecked()) {

                    txtMessage.setTextColor(
                            Color.RED);
                }

                else if(rbBlue.isChecked()) {

                    txtMessage.setTextColor(
                            Color.BLUE);
                }

                else if(rbGreen.isChecked()) {

                    txtMessage.setTextColor(
                            Color.GREEN);
                }

                // Bold + Italic

                if(cbBold.isChecked() &&
                        cbItalic.isChecked()) {

                    txtMessage.setTypeface(
                            null,
                            Typeface.BOLD_ITALIC);
                }

                else if(cbBold.isChecked()) {

                    txtMessage.setTypeface(
                            null,
                            Typeface.BOLD);
                }

                else if(cbItalic.isChecked()) {

                    txtMessage.setTypeface(
                            null,
                            Typeface.ITALIC);
                }

                else {

                    txtMessage.setTypeface(
                            null,
                            Typeface.NORMAL);
                }

                // Underline

                if(cbUnderline.isChecked()) {

                    txtMessage.setPaintFlags(
                            txtMessage.getPaintFlags()
                                    | Paint.UNDERLINE_TEXT_FLAG);
                }
            }
        });

        // Clear Button

        btnClear.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                etName.setText("");

                txtMessage.setText("");

import android.view.View;
import android.widget.Button;
import android.widget.EditText;
import android.widget.TextView;

public class MainActivity extends AppCompatActivity {

    EditText etName,
            etEmail,
            etPassword,
            etMobile;

    Button btnRegister;

    TextView txtResult;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etName = findViewById(R.id.etName);
        etEmail = findViewById(R.id.etEmail);
        etPassword = findViewById(R.id.etPassword);
        etMobile = findViewById(R.id.etMobile);

        btnRegister = findViewById(R.id.btnRegister);

        txtResult = findViewById(R.id.txtResult);

        btnRegister.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                String name =
                        etName.getText().toString();

                String email =
                        etEmail.getText().toString();

                String password =
                        etPassword.getText().toString();

                String mobile =
                        etMobile.getText().toString();

                // Validation

                if(name.isEmpty()) {

                    etName.setError(
                            "Enter Name");
                }

                else if(email.isEmpty()) {

                    etEmail.setError(
                            "Enter Email");
                }

                else if(password.isEmpty()) {

                    etPassword.setError(
                            "Enter Password");
                }

                else if(mobile.length() != 10) {

                    etMobile.setError(
                            "Enter Valid Mobile Number");
                }

                else {

                    txtResult.setText(
                            "Registration Successful");
                }
            }
        });
    }

package com.example.listviewdemo;

import androidx.appcompat.app.AppCompatActivity;

import android.os.Bundle;
import android.view.View;
import android.widget.ArrayAdapter;
import android.widget.Button;
import android.widget.EditText;
import android.widget.ListView;
import android.widget.TextView;

import java.util.ArrayList;

public class MainActivity extends AppCompatActivity {

    EditText etItem;

    Button btnInsert,
            btnDelete,
            btnSearch;

    TextView txtResult;

    ListView listView;

    ArrayList<String> list;

    ArrayAdapter<String> adapter;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etItem = findViewById(R.id.etItem);

        btnInsert = findViewById(R.id.btnInsert);
        btnDelete = findViewById(R.id.btnDelete);
        btnSearch = findViewById(R.id.btnSearch);

        txtResult = findViewById(R.id.txtResult);

        listView = findViewById(R.id.listView);

        // ArrayList

        list = new ArrayList<>();

        // Adapter

        adapter = new ArrayAdapter<>(
                this,
                android.R.layout.simple_list_item_1,
                list);

        listView.setAdapter(adapter);

        // Insert

        btnInsert.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                String item =
                        etItem.getText().toString();

                list.add(item);

                adapter.notifyDataSetChanged();

                txtResult.setText(
                        "Item Inserted");
            }
        });

        // Delete

        btnDelete.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                String item =
                        etItem.getText().toString();

                if(list.contains(item)) {

                    list.remove(item);

                    adapter.notifyDataSetChanged();

                    txtResult.setText(
                            "Item Deleted");
                }

                else {

                    txtResult.setText(
                            "Item Not Found");
                }
            }
        });

        // Search

        btnSearch.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                String item =
                        etItem.getText().toString();

                if(list.contains(item)) {

                    txtResult.setText(
                            "Item Found");
                }

                else {

                    txtResult.setText(
                            "Item Not Found");
                }
            }
        });
    }
}

import android.os.Bundle;
import android.util.Log;
import android.widget.Toast;
import androidx.appcompat.app.AppCompatActivity;

public class MainActivity extends AppCompatActivity {

    String TAG = "LIFECYCLE_DEMO";

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        Toast.makeText(this, "onCreate Called", Toast.LENGTH_SHORT).show();
        Log.d(TAG, "onCreate Called");
    }

    @Override
    protected void onStart() {
        super.onStart();
        Toast.makeText(this, "onStart Called", Toast.LENGTH_SHORT).show();
        Log.d(TAG, "onStart Called");
    }

    @Override
    protected void onResume() {
        super.onResume();
        Toast.makeText(this, "onResume Called", Toast.LENGTH_SHORT).show();
        Log.d(TAG, "onResume Called");
    }

    @Override
    protected void onPause() {
        super.onPause();
        Toast.makeText(this, "onPause Called", Toast.LENGTH_SHORT).show();
        Log.d(TAG, "onPause Called");
    }

    @Override
    protected void onStop() {
        super.onStop();
        Toast.makeText(this, "onStop Called", Toast.LENGTH_SHORT).show();
        Log.d(TAG, "onStop Called");
    }

    @Override

// ✅ CREATE CONTACT
function createContact() {
    var name = document.getElementById("name").value;
    var phone = document.getElementById("phone").value;

    var contact = navigator.contacts.create();
    contact.displayName = name;

    var phoneNumbers = [];
    phoneNumbers[0] = new ContactField('mobile', phone, true);
    contact.phoneNumbers = phoneNumbers;

    contact.save(function() {
        document.getElementById("status").innerHTML = "Contact Created Successfully!";
    }, function(err) {
        document.getElementById("status").innerHTML = "Error Creating Contact";
    });
}


// 🔍 SEARCH CONTACT
function searchContact() {
    var name = document.getElementById("name").value;

    var options = new ContactFindOptions();
    options.filter = name;
    options.multiple = true;

    var fields = ["displayName"];

    navigator.contacts.find(fields, function(contacts) {
        if (contacts.length > 0) {
            document.getElementById("status").innerHTML =
                "Contact Found: " + contacts[0].displayName;
        } else {
            document.getElementById("status").innerHTML = "No Contact Found";
        }
    }, function(error) {
        document.getElementById("status").innerHTML = "Search Failed";
    }, options);
}


// 📋 CLONE CONTACT
function cloneContact() {
    var name = document.getElementById("name").value;

    var options = new ContactFindOptions();
    options.filter = name;
    options.multiple = false;

    var fields = ["displayName", "phoneNumbers"];

    navigator.contacts.find(fields, function(contacts) {

        if (contacts.length > 0) {

            var oldContact = contacts[0];

            var newContact = navigator.contacts.create();
            newContact.displayName = oldContact.displayName + "_copy";
            newContact.phoneNumbers = oldContact.phoneNumbers;

            newContact.save(function() {
                document.getElementById("status").innerHTML =
                    "Contact Cloned Successfully!";
            });

        } else {
            document.getElementById("status").innerHTML = "Original Contact Not Found";
        }

    }, function() {
        document.getElementById("status").innerHTML = "Clone Failed";
    }, options);
}


// ❌ DELETE CONTACT
function deleteContact() {
    var name = document.getElementById("name").value;

    var options = new ContactFindOptions();
    options.filter = name;
    options.multiple = false;

    var fields = ["displayName"];

    navigator.contacts.find(fields, function(contacts) {

        if (contacts.length > 0) {
            contacts[0].remove(function() {
                document.getElementById("status").innerHTML =
                    "Contact Deleted Successfully!";
            }, function() {
                document.getElementById("status").innerHTML =
                    "Delete Failed";
            });

        } else {
            document.getElementById("status").innerHTML =
                "Contact Not Found";
        }

    }, function() {
        document.getElementById("status").innerHTML =
            "Error in Deleting Contact";
    }, options);
}

	package com.example.sqliteapp;

import android.content.ContentValues;
import android.content.Context;
import android.database.Cursor;
import android.database.sqlite.SQLiteDatabase;
import android.database.sqlite.SQLiteOpenHelper;

public class DBHelper extends SQLiteOpenHelper {

    public static final String DB_NAME = "ProjectDB";
    public static final String TABLE_NAME = "Project";

    public DBHelper(Context context) {
        super(context, DB_NAME, null, 1);
    }

    @Override
    public void onCreate(SQLiteDatabase db) {

        db.execSQL("CREATE TABLE " + TABLE_NAME +
                "(id INTEGER PRIMARY KEY, name TEXT, dept TEXT, city TEXT)");
    }

    @Override
    public void onUpgrade(SQLiteDatabase db, int oldVersion, int newVersion) {
        db.execSQL("DROP TABLE IF EXISTS " + TABLE_NAME);
        onCreate(db);
    }

    // ➕ Insert record
    public void insertProject(int id, String name, String dept, String city) {

        SQLiteDatabase db = this.getWritableDatabase();

        ContentValues values = new ContentValues();
        values.put("id", id);
        values.put("name", name);
        values.put("dept", dept);
        values.put("city", city);

        db.insert(TABLE_NAME, null, values);
    }

    // 📄 Get all records
    public Cursor getAllProjects() {

        SQLiteDatabase db = this.getReadableDatabase();
        return db.rawQuery("SELECT * FROM " + TABLE_NAME, null);
    }
}

                temp = temp / 10;
            }

        }

        return true;
    }

package com.example.sdcardapp;

import android.Manifest;
import android.content.pm.PackageManager;
import android.os.Bundle;
import android.os.Environment;
import android.view.View;
import android.widget.Button;
import android.widget.EditText;
import android.widget.TextView;
import android.widget.Toast;

import androidx.appcompat.app.AppCompatActivity;
import androidx.core.app.ActivityCompat;
import androidx.core.content.ContextCompat;

import java.io.File;
import java.io.FileOutputStream;

public class MainActivity extends AppCompatActivity {

    EditText etData;
    Button btnSave;
    TextView tvStatus;

    private static final int REQUEST_CODE = 1;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etData = findViewById(R.id.etData);
        btnSave = findViewById(R.id.btnSave);
        tvStatus = findViewById(R.id.tvStatus);

        // 🔐 Runtime permission check
        if (ContextCompat.checkSelfPermission(this,
                Manifest.permission.WRITE_EXTERNAL_STORAGE)
                != PackageManager.PERMISSION_GRANTED) {

            ActivityCompat.requestPermissions(this,
                    new String[]{Manifest.permission.WRITE_EXTERNAL_STORAGE},
                    REQUEST_CODE);
        }

        btnSave.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View v) {

                String data = etData.getText().toString();

                if (data.isEmpty()) {
                    Toast.makeText(MainActivity.this,
                            "Enter some text", Toast.LENGTH_SHORT).show();
                    return;
                }

                writeToSDCard(data);
            }
        });
    }

    // 💾 Write data to SD Card
    private void writeToSDCard(String data) {

        try {
            File folder = new File(Environment.getExternalStorageDirectory(), "MyFiles");

            if (!folder.exists()) {
                folder.mkdirs();
            }

            File file = new File(folder, "data.txt");

            FileOutputStream fos = new FileOutputStream(file);
            fos.write(data.getBytes());
            fos.close();

            tvStatus.setText("Data saved successfully at:\n" + file.getPath());

        } catch (Exception e) {
            tvStatus.setText("Error: " + e.getMessage());
        }
    }
}

	package com.example.radiooperation;

import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.EditText;
import android.widget.RadioButton;
import android.widget.RadioGroup;
import android.widget.TextView;
import androidx.appcompat.app.AppCompatActivity;

public class MainActivity extends AppCompatActivity {

    EditText etNum1, etNum2;
    RadioGroup radioGroup;
    RadioButton rbAdd, rbSub, rbMul, rbDiv;
    Button btnCalculate;
    TextView tvResult;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etNum1 = findViewById(R.id.etNum1);
        etNum2 = findViewById(R.id.etNum2);

        radioGroup = findViewById(R.id.radioGroup);

        rbAdd = findViewById(R.id.rbAdd);
        rbSub = findViewById(R.id.rbSub);
        rbMul = findViewById(R.id.rbMul);
        rbDiv = findViewById(R.id.rbDiv);

        btnCalculate = findViewById(R.id.btnCalculate);
        tvResult = findViewById(R.id.tvResult);

        btnCalculate.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View v) {

                double num1 = Double.parseDouble(etNum1.getText().toString());
                double num2 = Double.parseDouble(etNum2.getText().toString());
                double result = 0;

                if (rbAdd.isChecked()) {
                    result = num1 + num2;
                    tvResult.setText("Addition: " + result);
                }

                else if (rbSub.isChecked()) {
                    result = num1 - num2;
                    tvResult.setText("Subtraction: " + result);
                }

                else if (rbMul.isChecked()) {
                    result = num1 * num2;
                    tvResult.setText("Multiplication: " + result);
                }

                else if (rbDiv.isChecked()) {

                    if (num2 == 0) {
                        tvResult.setText("Cannot divide by zero");
                    } else {
                        result = num1 / num2;
                        tvResult.setText("Division: " + result);
                    }
                }

                else {
                    tvResult.setText("Please select an operation");
                }
            }
        });
    }
}

import android.graphics.Color;

import android.os.Bundle;
import android.view.View;
import android.widget.*;
import androidx.appcompat.app.AppCompatActivity;

public class MainActivity extends AppCompatActivity {

    EditText etName;
    TextView tvLabel;
    RadioGroup radioGroupColor;
    RadioButton rbRed, rbBlue, rbGreen;
    CheckBox cbBold, cbItalic, cbUnderline;
    Button btnDisplay, btnClear, btnExit;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etName = findViewById(R.id.etName);
        tvLabel = findViewById(R.id.tvLabel);

        radioGroupColor = findViewById(R.id.radioGroupColor);
        rbRed = findViewById(R.id.rbRed);
        rbBlue = findViewById(R.id.rbBlue);
        rbGreen = findViewById(R.id.rbGreen);

        cbBold = findViewById(R.id.cbBold);
        cbItalic = findViewById(R.id.cbItalic);
        cbUnderline = findViewById(R.id.cbUnderline);

        btnDisplay = findViewById(R.id.btnDisplay);
        btnClear = findViewById(R.id.btnClear);
        btnExit = findViewById(R.id.btnExit);

        // 📌 Display Button
        btnDisplay.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View v) {

                String name = etName.getText().toString();
                String message = "Hello " + name;

                tvLabel.setText(message);

                // 🎨 Color selection
                if (rbRed.isChecked()) {
                    tvLabel.setTextColor(Color.RED);
                } else if (rbBlue.isChecked()) {
                    tvLabel.setTextColor(Color.BLUE);
                } else if (rbGreen.isChecked()) {
                    tvLabel.setTextColor(Color.GREEN);
                }

                // ✍ Bold + Italic
                if (cbBold.isChecked() && cbItalic.isChecked()) {
                    tvLabel.setTypeface(null, android.graphics.Typeface.BOLD_ITALIC);
                } else if (cbBold.isChecked()) {
                    tvLabel.setTypeface(null, android.graphics.Typeface.BOLD);
                } else if (cbItalic.isChecked()) {
                    tvLabel.setTypeface(null, android.graphics.Typeface.ITALIC);
                } else {
                    tvLabel.setTypeface(null, android.graphics.Typeface.NORMAL);
                }

                // ⬇ Underline
                if (cbUnderline.isChecked()) {
                    tvLabel.setPaintFlags(tvLabel.getPaintFlags()
                            | Paint.UNDERLINE_TEXT_FLAG);
                } else {
                    tvLabel.setPaintFlags(0);
                }
            }
        });

        // 🧹 Clear Button
        btnClear.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View v) {

                etName.setText("");
                tvLabel.setText("Output will appear here");

                radioGroupColor.clearCheck();
                cbBold.setChecked(false);
                cbItalic.setChecked(false);
                cbUnderline.setChecked(false);
            }
        });

        // ❌ Exit Button
        btnExit.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View v) {
                finish();
            }
        });
    }
}

		package com.example.cardb;

import android.content.ContentValues;
import android.content.Context;
import android.database.Cursor;
import android.database.sqlite.SQLiteDatabase;
import android.database.sqlite.SQLiteOpenHelper;

public class DBHelper extends SQLiteOpenHelper {

    public static final String DB_NAME = "CarDB";
    public static final String TABLE_NAME = "Car";

    public DBHelper(Context context) {
        super(context, DB_NAME, null, 1);
    }

    @Override
    public void onCreate(SQLiteDatabase db) {

        db.execSQL("CREATE TABLE " + TABLE_NAME +
                "(id INTEGER PRIMARY KEY, name TEXT, type TEXT, color TEXT)");
    }

    @Override
    public void onUpgrade(SQLiteDatabase db, int oldVersion, int newVersion) {

        db.execSQL("DROP TABLE IF EXISTS " + TABLE_NAME);
        onCreate(db);
    }

    // ➕ Insert Car
    public void insertCar(int id, String name, String type, String color) {

        SQLiteDatabase db = this.getWritableDatabase();

        ContentValues values = new ContentValues();
        values.put("id", id);
        values.put("name", name);
        values.put("type", type);
        values.put("color", color);

        db.insert(TABLE_NAME, null, values);
    }

    // 📄 Fetch all cars
    public Cursor getAllCars() {

        SQLiteDatabase db = this.getReadableDatabase();
        return db.rawQuery("SELECT * FROM " + TABLE_NAME, null);
    }
}

                            "No SMS app found",

                    Toast.makeText(MainActivity.this,
                            "Login Successful...",
                            Toast.LENGTH_LONG).show();

                } else {

                    Toast.makeText(MainActivity.this,
                            "Invalid Login",
                            Toast.LENGTH_LONG).show();
                }
            }
        });
    }
}

<script>
    function copyProgram(elementId, buttonId) {
        // प्रोग्राम कोड असलेला घटक (element) मिळवा
        const elementToCopy = document.getElementById(elementId);
        const button = document.getElementById(buttonId);
        
        // <textarea> मधून टेक्स्ट मिळवा
        const textToCopy = elementToCopy.value; 

        // navigator.clipboard API वापरून टेक्स्ट कॉपी करा
        navigator.clipboard.writeText(textToCopy)
            .then(() => {
                // बटणचा मजकूर तात्पुरता बदलणे (Success feedback)
                const originalText = button.innerText;
                button.innerText = 'copied';'calendar'
    
                button.classList.add('copied');
                
                // 1.5 सेकंदांनंतर बटण पूर्ववत करा
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove('copied');
                }, 1500);

            })
            .catch(err => {
                console.error('टेक्स्ट कॉपी करताना त्रुटी आली: ', err);
                alert('कॉपी करण्यात अपयश आले. ब्राउझर सेटिंग्ज तपासा किंवा मॅन्युअली कॉपी करा.');
            });
    }
</script>
