public class SplashActivity extends AppCompatActivity {

			package com.example.studentdb;

import android.content.ContentValues;
import android.content.Context;
import android.database.Cursor;
import android.database.sqlite.SQLiteDatabase;
import android.database.sqlite.SQLiteOpenHelper;

public class DBHelper extends SQLiteOpenHelper {

    public DBHelper(Context context) {
        super(context, "StudentDB", null, 1);
    }

    @Override
    public void onCreate(SQLiteDatabase db) {

        db.execSQL("CREATE TABLE Student(" +
                "roll_no INTEGER PRIMARY KEY," +
                "name TEXT," +
                "address TEXT," +
                "percentage REAL)");
    }

    @Override
    public void onUpgrade(SQLiteDatabase db,
                          int oldVersion,
                          int newVersion) {

        db.execSQL("DROP TABLE IF EXISTS Student");
        onCreate(db);
    }

    // Insert Record
    public void insertStudent(int roll,
                              String name,
                              String address,
                              float per) {

        SQLiteDatabase db = this.getWritableDatabase();

        ContentValues cv = new ContentValues();

        cv.put("roll_no", roll);
        cv.put("name", name);
        cv.put("address", address);
        cv.put("percentage", per);

        db.insert("Student", null, cv);
    }

    // Show Records
    public Cursor getStudents() {

        SQLiteDatabase db = this.getReadableDatabase();

        return db.rawQuery("SELECT * FROM Student", null);
    }
}

public class MainActivity extends AppCompatActivity {

        setContentView(R.layout.activity_main);

        btnShow = findViewById(R.id.btnShow);
        txtResult = findViewById(R.id.txtResult);

        db = new DBHelper(this);

        // Insert 5 records
        btnInsert.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                db.insertStudent(1,"Rahul","Nashik",85);
                db.insertStudent(2,"Amit","Pune",78);
                db.insertStudent(3,"Sneha","Mumbai",90);
                db.insertStudent(4,"Pooja","Nagar",88);
                db.insertStudent(5,"Rohit","Satara",75);

                txtResult.setText("5 Records Inserted");
            }

        // Show records
        btnShow.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                Cursor c = db.getStudents();

                String data = "";

                while(c.moveToNext()) {

                    data += "Roll No : "

                    data += "Name : "
                            + c.getString(1) + "\n";

                    data += "Address : "
                            + c.getString(2) + "\n";

                    data += "Percentage : "
                            + c.getFloat(3) + "\n\n";

                txtResult.setText(data);

			package com.example.perfectnumber;

import androidx.appcompat.app.AppCompatActivity;

import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.EditText;
import android.widget.Toast;

public class MainActivity extends AppCompatActivity {

    EditText etNumber;
    Button btnCheck;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etNumber = findViewById(R.id.etNumber);
        btnCheck = findViewById(R.id.btnCheck);

        btnCheck.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                int num = Integer.parseInt(
                        etNumber.getText().toString());

                int sum = 0;

                for(int i=1; i<num; i++) {

                    if(num % i == 0) {
                        sum = sum + i;
                    }
                }

                if(sum == num) {

                    Toast.makeText(
                            MainActivity.this,
                            num + " is Perfect Number",
                            Toast.LENGTH_LONG).show();
                }
                else {

                    Toast.makeText(
                            MainActivity.this,
                            num + " is Not Perfect Number",
                            Toast.LENGTH_LONG).show();
                }
            }
        });
    }
}

import androidx.appcompat.app.AppCompatActivity;

import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.EditText;
import android.widget.TextView;

public class MainActivity extends AppCompatActivity {

    EditText etNumber;
    Button btnCheck;
    TextView txtResult;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etNumber = findViewById(R.id.etNumber);
        btnCheck = findViewById(R.id.btnCheck);
        txtResult = findViewById(R.id.txtResult);

        btnCheck.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                int num = Integer.parseInt(
                        etNumber.getText().toString());

                int original = num;
                int rem, sum = 0;

                while(num > 0) {

                    rem = num % 10;

                    sum = sum + (rem * rem * rem);

                    num = num / 10;
                }

                if(sum == original) {

                    txtResult.setText(
                            original + " is Armstrong Number");
                }
                else {

                    txtResult.setText(
                            original + " is Not Armstrong Number");
                }
            }
        });
    }
}

		package com.example.imageswitcher;

import androidx.appcompat.app.AppCompatActivity;

import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.ImageSwitcher;
import android.widget.ImageView;
import android.widget.ViewSwitcher;

public class MainActivity extends AppCompatActivity {

    ImageSwitcher imageSwitcher;
    Button btnNext;

    int images[] = {
            R.drawable.img1,
            R.drawable.img2,
            R.drawable.img3
    };

    int index = 0;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        imageSwitcher = findViewById(R.id.imageSwitcher);
        btnNext = findViewById(R.id.btnNext);

        // setFactory()
        imageSwitcher.setFactory(new ViewSwitcher.ViewFactory() {
            @Override
            public View makeView() {

                ImageView imageView =
                        new ImageView(getApplicationContext());

                imageView.setScaleType(
                        ImageView.ScaleType.FIT_CENTER);

                imageView.setLayoutParams(
                        new ImageSwitcher.LayoutParams(
                                300,
                                300));

                return imageView;
            }
        });

        // First image
        imageSwitcher.setImageResource(images[index]);

        btnNext.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                index++;

                if(index == images.length) {
                    index = 0;
                }

                imageSwitcher.setImageResource(
                        images[index]);
            }
        });
    }
}

    protected void onCreate(Bundle savedInstanceState) {

        setContentView(R.layout.activity_main);

        btnAlert = findViewById(R.id.btnAlert);

        btnAlert.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                AlertDialog.Builder builder =
                        new AlertDialog.Builder(MainActivity.this);

                builder.setTitle("Alert Dialog");

                builder.setMessage(
                        "Do you want to exit?");

                builder.setPositiveButton(
                        "YES",

                        new DialogInterface.OnClickListener() {

	package com.example.textformat;

import androidx.appcompat.app.AppCompatActivity;

import android.graphics.Color;
import android.graphics.Paint;
import android.graphics.Typeface;
import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.CheckBox;
import android.widget.EditText;
import android.widget.RadioButton;
import android.widget.TextView;

public class MainActivity extends AppCompatActivity {

    EditText etName;
    TextView txtMessage;

    RadioButton rbRed, rbBlue, rbGreen;

    CheckBox cbBold, cbItalic, cbUnderline;

    Button btnDisplay, btnClear, btnExit;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etName = findViewById(R.id.etName);

        txtMessage = findViewById(R.id.txtMessage);

        rbRed = findViewById(R.id.rbRed);
        rbBlue = findViewById(R.id.rbBlue);
        rbGreen = findViewById(R.id.rbGreen);

        cbBold = findViewById(R.id.cbBold);
        cbItalic = findViewById(R.id.cbItalic);
        cbUnderline = findViewById(R.id.cbUnderline);

        btnDisplay = findViewById(R.id.btnDisplay);
        btnClear = findViewById(R.id.btnClear);
        btnExit = findViewById(R.id.btnExit);

        // Display Button

        btnDisplay.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                String name =
                        etName.getText().toString();

                txtMessage.setText(
                        "Welcome " + name);

                // Change Color

                if(rbRed.isChecked()) {

                    txtMessage.setTextColor(
                            Color.RED);
                }

                if(rbBlue.isChecked()) {

                    txtMessage.setTextColor(
                            Color.BLUE);
                }

                if(rbGreen.isChecked()) {

                    txtMessage.setTextColor(
                            Color.GREEN);
                }

                // Bold + Italic

                if(cbBold.isChecked() &&
                        cbItalic.isChecked()) {

                    txtMessage.setTypeface(
                            null,
                            Typeface.BOLD_ITALIC);
                }

                else if(cbBold.isChecked()) {

                    txtMessage.setTypeface(
                            null,
                            Typeface.BOLD);
                }

                else if(cbItalic.isChecked()) {

                    txtMessage.setTypeface(
                            null,
                            Typeface.ITALIC);
                }

                else {

                    txtMessage.setTypeface(
                            null,
                            Typeface.NORMAL);
                }

                // Underline

                if(cbUnderline.isChecked()) {

                    txtMessage.setPaintFlags(
                            txtMessage.getPaintFlags()
                                    | Paint.UNDERLINE_TEXT_FLAG);
                }
            }
        });

        // Clear Button

        btnClear.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                etName.setText("");
                txtMessage.setText("");

                cbBold.setChecked(false);
                cbItalic.setChecked(false);
                cbUnderline.setChecked(false);
            }
        });

        // Exit Button

        btnExit.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                finish();
            }
        });
    }
}

	package com.example.loginform;

import androidx.appcompat.app.AppCompatActivity;

import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.EditText;
import android.widget.TextView;

public class MainActivity extends AppCompatActivity {

    EditText etUsername, etPassword;
    Button btnLogin;
    TextView txtResult;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etUsername = findViewById(R.id.etUsername);
        etPassword = findViewById(R.id.etPassword);

        btnLogin = findViewById(R.id.btnLogin);

        txtResult = findViewById(R.id.txtResult);

        btnLogin.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                String username =
                        etUsername.getText().toString();

                String password =
                        etPassword.getText().toString();

                // Validation

                if(username.isEmpty()) {

                    etUsername.setError(
                            "Enter Username");
                }

                else if(password.isEmpty()) {

                    etPassword.setError(
                            "Enter Password");
                }

                else if(username.equals("admin")
                        && password.equals("1234")) {

                    txtResult.setText(
                            "Login Successful");
                }

                else {

                    txtResult.setText(
                            "Invalid Username or Password");
                }
            }
        });
    }
}

	package com.example.googlemap;

import androidx.appcompat.app.AppCompatActivity;

import android.content.Intent;
import android.net.Uri;
import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.EditText;

public class MainActivity extends AppCompatActivity {

    EditText etLocation;
    Button btnSearch;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);

        etLocation = findViewById(R.id.etLocation);
        btnSearch = findViewById(R.id.btnSearch);

        btnSearch.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View view) {

                String location =
                        etLocation.getText().toString();

                Uri uri = Uri.parse(
                        "geo:0,0?q=" + location);

                Intent intent =
                        new Intent(Intent.ACTION_VIEW, uri);

                intent.setPackage(
                        "com.google.android.apps.maps");

                startActivity(intent);
            }
        });
    }
}

<script>
    function copyProgram(elementId, buttonId) {
        // प्रोग्राम कोड असलेला घटक (element) मिळवा
        const elementToCopy = document.getElementById(elementId);
        const button = document.getElementById(buttonId);
        
        // <textarea> मधून टेक्स्ट मिळवा
        const textToCopy = elementToCopy.value; 

        // navigator.clipboard API वापरून टेक्स्ट कॉपी करा
        navigator.clipboard.writeText(textToCopy)
            .then(() => {
                // बटणचा मजकूर तात्पुरता बदलणे (Success feedback)
                const originalText = button.innerText;
                button.innerText = 'copied';'calendar'
    
                button.classList.add('copied');
                
                // 1.5 सेकंदांनंतर बटण पूर्ववत करा
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove('copied');
                }, 1500);

            })
            .catch(err => {
                console.error('टेक्स्ट कॉपी करताना त्रुटी आली: ', err);
                alert('कॉपी करण्यात अपयश आले. ब्राउझर सेटिंग्ज तपासा किंवा मॅन्युअली कॉपी करा.');
            });
    }
</script>
