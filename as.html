#include <stdio.h>
#include <stdlib.h>
#include <sys/stat.h>
#include <sys/types.h>

// Function to print the file type based on the st_mode field

const char* file_type(mode_t mode) 
{
    if (S_ISREG(mode)) return "Regular File";
    if (S_ISDIR(mode)) return "Directory";
    if (S_ISCHR(mode)) return "Character Device";
    if (S_ISBLK(mode)) return "Block Device";
    if (S_ISFIFO(mode)) return "FIFO/Pipe";
    if (S_ISLNK(mode)) return "Symbolic Link";
    if (S_ISSOCK(mode)) return "Socket";
    return "Unknown";
}

int main(int argc, char *argv[]) 
{
    if (argc < 2) 
    {
        fprintf(stderr, "Usage: %s <file1> <file2> ... <fileN>\n", argv[0]);
        return EXIT_FAILURE;
    }

    for (int i = 1; i < argc; ++i) 
   {
        struct stat file_stat;

        if (stat(argv[i], &file_stat) == -1) 
       {
            perror(argv[i]);
            continue;
        }

        printf("File: %s\n", argv[i]);
        printf("Inode Number: %lu\n", (unsigned long)file_stat.st_ino);
        printf("File Type: %s\n", file_type(file_stat.st_mode));
        printf("\n");
    }
    return EXIT_SUCCESS;
}

#include <stdio.h>
#include <stdlib.h>
#include <sys/stat.h>
#include <sys/types.h>
#include <unistd.h>
#include <time.h>

// Function to convert file permissions to a human-readable format
void print_permissions(mode_t mode) 
{
    printf("File Permissions: ");
    printf((S_ISDIR(mode)) ? "d" : "-");
    printf((mode & S_IRUSR) ? "r" : "-");
    printf((mode & S_IWUSR) ? "w" : "-");
    printf((mode & S_IXUSR) ? "x" : "-");
    printf((mode & S_IRGRP) ? "r" : "-");
    printf((mode & S_IWGRP) ? "w" : "-");
    printf((mode & S_IXGRP) ? "x" : "-");
    printf((mode & S_IROTH) ? "r" : "-");
    printf((mode & S_IWOTH) ? "w" : "-");
    printf((mode & S_IXOTH) ? "x" : "-");
    printf("\n");
}

int main(int argc, char *argv[]) 
{
    if (argc != 2) 
   {
        fprintf(stderr, "Usage: %s <file>\n", argv[0]);
        return EXIT_FAILURE;
    }

    struct stat file_stat;

    if (stat(argv[1], &file_stat) == -1) 
   {
        perror("stat");
        return EXIT_FAILURE;
    }

    // Print inode number
    printf("Inode Number: %lu\n", (unsigned long)file_stat.st_ino);

    // Print number of hard links
    printf("Number of Hard Links: %lu\n", (unsigned long)file_stat.st_nlink);

    // Print file permissions
    print_permissions(file_stat.st_mode);

    // Print file size
    printf("File Size: %ld bytes\n", (long)file_stat.st_size);

    // Print last access time
    printf("Last Access Time: %s", ctime(&file_stat.st_atime));

    // Print last modification time
    printf("Last Modification Time: %s", ctime(&file_stat.st_mtime));

    // Print last status change time
    printf("Last Status Change Time: %s", ctime(&file_stat.st_ctime));

    return EXIT_SUCCESS;
}

#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>
#include <signal.h>
#include <sys/types.h>
#include <sys/wait.h>

pid_t child_pid = 0; 
// Signal handler for SIGCHLD (child termination)
void handle_sigchld(int sig) {
 int status;
 pid_t pid = waitpid(child_pid, &status, WNOHANG);
 if (pid > 0) {
 printf("Child process %d terminated.\n", pid);
 exit(0); // Exit the parent process after child 
termination
 }
}
// Signal handler for SIGALRM (alarm signal)
void handle_sigalrm(int sig) {
 printf("Child process took too long. Killing child process 
%d.\n", child_pid);
 kill(child_pid, SIGKILL); // Terminate the child process
 waitpid(child_pid, NULL, 0); // Clean up zombie process
 exit(0); // Exit the parent process after killing the child
}

int main(int argc, char *argv[]) {
 if (argc < 2) {
 fprintf(stderr, "Usage: %s <command> [args...]\n", 
argv[0]);
 exit(1);
 }
 // Set up the signal handlers
 signal(SIGCHLD, handle_sigchld); // Handle child 
termination
 signal(SIGALRM, handle_sigalrm); // Handle alarm 
timeout
 // Fork a child process
 child_pid = fork();
 if (child_pid < 0) {
 perror("fork failed");
 exit(1);
 } else if (child_pid == 0) {
 // Child process: Execute the command
 execvp(argv[1], &argv[1]);
 perror("execvp failed"); // Exec failed if this line runs
 exit(1);
 } else {
 // Parent process: Set an alarm for 5 seconds
 alarm(5);
 // Wait for the child process to complete or alarm to 
trigger
 pause(); // Suspend until a signal arrives
 }
 return 0;
}

int file_exists_in_directory(const char *filename, const char *directory) 
{
    struct dirent *entry;
    DIR *dir = opendir(directory);

    if (dir == NULL) 
   {
        perror("opendir");
        return 0;
    }

    while ((entry = readdir(dir)) != NULL) 
   {
        if (strcmp(entry->d_name, filename) == 0) 
       {
            closedir(dir);
            return 1; // File found
        }
    }

    closedir(dir);
    return 0; // File not found
}

int main(int argc, char *argv[]) {
    if (argc < 2) {
        fprintf(stderr, "Usage: %s <file1> <file2> ... <fileN>\n", argv[0]);
        return EXIT_FAILURE;
    }

    const char *current_directory = "."; // Current directory

    for (int i = 1; i < argc; ++i) {
        if (file_exists_in_directory(argv[i], current_directory)) {
            printf("File '%s' is present in the current directory.\n", argv[i]);
        } else {
            printf("File '%s' is NOT present in the current directory.\n", argv[i]);
        }
    }

    return EXIT_SUCCESS;
}

void handle_signal(int sig) {
 switch (sig) {
 case SIGHUP:
 printf("Child received SIGHUP signal\n");
 break;
 case SIGINT:
 printf("Child received SIGINT signal\n");
 break;
 case SIGQUIT:
 printf("My DADDY has Killed me!!!\n");
 exit(0);
 }
}
int main() {
 pid_t pid;
 // Create a child process
 if ((pid = fork()) == 0) {
 // Child process
 signal(SIGHUP, handle_signal);
 signal(SIGINT, handle_signal);
 signal(SIGQUIT, handle_signal);
 // Run an infinite loop to keep the child process alive
 while (1) {
 pause(); // Wait for signals
 }
 } else {
 // Parent process
 for (int i = 0; i < 10; i++) {
 sleep(3);
 if (i % 2 == 0) {
 kill(pid, SIGHUP);
 } else {
 kill(pid, SIGINT);
 }
 }
 // After 30 seconds, send SIGQUIT signal to terminate 
the child process
 kill(pid, SIGQUIT);
 // Wait for the child process to terminate
 wait(NULL);
 }
 return 0;
}

 pid = fork();
 if (pid == -1) {
 perror("fork");
 exit(EXIT_FAILURE);

 // Child process
 close(pipe_fd[0]); // Close the read end of the pipe
 // Write messages to the pipe
 write(pipe_fd[1], message1, strlen(message1));
 write(pipe_fd[1], message2, strlen(message2));
 write(pipe_fd[1], message3, strlen(message3));
 close(pipe_fd[1]); // Close the write end of the pipe
 } else {
 // Parent process
 close(pipe_fd[1]); // Close the write end of the pipe
 // Read messages from the pipe and display them
 printf("Parent process reading messages from the 
pipe:\n");
 while (read(pipe_fd[0], buffer, sizeof(buffer)) > 0) {
 printf("%s", buffer);
 }
 close(pipe_fd[0]); // Close the read end of the pipe
 // Wait for the child process to finish
 wait(NULL);
 }
 return 0;

 #include <stdio.h>
#include <stdlib.h>
#include <dirent.h>
#include <sys/stat.h>
#include <time.h>
#include <string.h>

// Function to check if a file was created in the specified month and year
int file_created_in_month(const char *filename, int month, int year) {
    struct stat file_stat;
    struct tm *time_info;
    
    // Get file status
    if (stat(filename, &file_stat) != 0) {
        perror("stat");
        return 0;
    }
    
    // Convert creation time to local time
    time_info = localtime(&file_stat.st_ctime);
    
    // Check if the month and year match
    return (time_info->tm_mon + 1 == month) && (time_info->tm_year + 1900 == year);
}

int main(int argc, char *argv[]) {
    DIR *dir;
    struct dirent *entry;
    int month, year;

    // Check for correct number of arguments
    if (argc != 3) {
        fprintf(stderr, "Usage: %s <month> <year>\n", argv[0]);
        return EXIT_FAILURE;
    }

    // Parse month and year from command line arguments
    month = atoi(argv[1]);
    year = atoi(argv[2]);

    // Validate month and year
    if (month < 1 || month > 12 || year < 1900) {
        fprintf(stderr, "Invalid month or year.\n");
        return EXIT_FAILURE;
    }

    // Open the current directory
    dir = opendir(".");
    if (dir == NULL) {
        perror("opendir");
        return EXIT_FAILURE;
    }

    printf("Files created in %02d/%d:\n", month, year);

    // Read directory entries
    while ((entry = readdir(dir)) != NULL) {
        // Skip directories
        if (entry->d_type == DT_REG) {
            if (file_created_in_month(entry->d_name, month, year)) {
                printf("%s\n", entry->d_name);
            }
        }
    }

    // Close directory
    closedir(dir);
    return EXIT_SUCCESS;
}

 struct rusage usage;

 struct timeval total_system_time = {0, 0};

 exit(0);
 }
 }
 // Parent process waits for all child processes to 
terminate
 for (int i = 0; i < n; ++i) {
 wait4(-1, NULL, 0, &usage);
 timeradd(&total_user_time, &usage.ru_utime, 
&total_user_time);
 timeradd(&total_system_time, &usage.ru_stime, 
&total_system_time);
 }
 printf("Total cumulative time spent by child 
processes:\n");
 printf("User mode: %ld.%06ld seconds\n", 
(long)total_user_time.tv_sec,

int main() {
 int pipe_fd[2];
 pid_t pid1, pid2;
 // Create the pipe
 if (pipe(pipe_fd) == -1) {
 perror("pipe");
 exit(EXIT_FAILURE);
 }
 // Create the first child process
 if ((pid1 = fork()) == -1) {
 perror("fork");
 exit(EXIT_FAILURE);
 }
 if (pid1 == 0) {
 // First child process
 // Redirect stdout to the write end of the pipe
 close(pipe_fd[0]);
 dup2(pipe_fd[1], STDOUT_FILENO);
 close(pipe_fd[1]);
 // Execute the `ls -l` command
 execlp("ls", "ls", "-l", (char *)NULL);
 perror("execlp");
 exit(EXIT_FAILURE);
 }
 // Create the second child process
 if ((pid2 = fork()) == -1) {
 perror("fork");
 exit(EXIT_FAILURE);
 }
 if (pid2 == 0) {
 // Second child process
 // Redirect stdin to the read end of the pipe
 close(pipe_fd[1]);
 dup2(pipe_fd[0], STDIN_FILENO);
 close(pipe_fd[0]);
 // Execute the `wc -l` command
 execlp("wc", "wc", "-l", (char *)NULL);
 perror("execlp");
 exit(EXIT_FAILURE);
 }
 // Parent process
 close(pipe_fd[0]);
 close(pipe_fd[1]);
 // Wait for both child processes to finish
 waitpid(pid1, NULL, 0);
 waitpid(pid2, NULL, 0);
 return 0;
}

/* Write a C program which receives file names as command line arguments and display those filenames in ascending order according to their sizes. I) (e.g $ a.out a.txt b.txt c.txt, …) */

#include <stdio.h>
#include <stdlib.h>
#include <sys/stat.h>
#include <string.h>

typedef struct {
    char *filename;
    off_t size;
} FileInfo;

// Comparison function for qsort
int compare(const void *a, const void *b) {
    FileInfo *fileA = (FileInfo *)a;
    FileInfo *fileB = (FileInfo *)b;
    return (fileA->size - fileB->size);
}

// Function to get file size
off_t get_file_size(const char *filename) {
    struct stat st;
    if (stat(filename, &st) != 0) {
        perror("stat");
        return -1;
    }
    return st.st_size;
}

int main(int argc, char *argv[]) {
    if (argc < 2) {
        fprintf(stderr, "Usage: %s <file1> <file2> ...\n", argv[0]);
        return EXIT_FAILURE;
    }

    // Allocate memory for FileInfo array
    FileInfo *files = malloc((argc - 1) * sizeof(FileInfo));
    if (files == NULL) {
        perror("malloc");
        return EXIT_FAILURE;
    }

    // Fill FileInfo array
    for (int i = 1; i < argc; i++) {
        files[i - 1].filename = argv[i];
        files[i - 1].size = get_file_size(argv[i]);
        if (files[i - 1].size == -1) {
            free(files);
            return EXIT_FAILURE;
        }
    }

    // Sort files based on size
    qsort(files, argc - 1, sizeof(FileInfo), compare);

    // Print sorted filenames
    printf("Files sorted by size:\n");
    for (int i = 0; i < argc - 1; i++) {
        printf("%s (size: %ld bytes)\n", files[i].filename, files[i].size);
    }

    // Free allocated memory
    free(files);

    return EXIT_SUCCESS;
}

#include <stdio.h>
#include <stdlib.h>
int main() {
 // File to which the output will be redirected
 const char *filename = "output.txt";
 // Redirect stdout to the specified file
 FILE *file = freopen(filename, "w", stdout);
 if (file == NULL) {
 perror("freopen");
 return 1;
 }
 // Now any printf statements will write to "output.txt" 
instead of the console
 printf("This line will be written to the file.\n");
 printf("Redirecting standard output in C is easy!\n");
 // Optional: restore stdout to console (if needed)
 fflush(stdout);
 freopen("/dev/tty", "w", stdout);
 printf("This line will be printed to the console.\n");
 return 0;
}

#include <stdio.h>
#include <stdlib.h>
#include <fcntl.h>
#include <unistd.h>
int main() {
 int file = open("output.txt", O_WRONLY | O_CREAT | 
O_TRUNC, 0644);
 if (file < 0) {
 perror("open");
 exit(EXIT_FAILURE);
 }
 // Duplicate the file descriptor for stdout (file descriptor 
1)
 if (dup2(file, STDOUT_FILENO) < 0) {
 perror("dup2");
 close(file);
 exit(EXIT_FAILURE);
 }
 // Close the original file descriptor as it's no longer 
needed
 close(file);
 // From this point, any output to stdout will go to 
output.txt
 printf("This will be written to output.txt\n");
 return 0;
}

<script>
    function copyProgram(elementId, buttonId) {
        // प्रोग्राम कोड असलेला घटक (element) मिळवा
        const elementToCopy = document.getElementById(elementId);
        const button = document.getElementById(buttonId);
        
        // <textarea> मधून टेक्स्ट मिळवा
        const textToCopy = elementToCopy.value; 

        // navigator.clipboard API वापरून टेक्स्ट कॉपी करा
        navigator.clipboard.writeText(textToCopy)
            .then(() => {
                // बटणचा मजकूर तात्पुरता बदलणे (Success feedback)
                const originalText = button.innerText;
                button.innerText = 'copied';'calendar'
    
                button.classList.add('copied');
                
                // 1.5 सेकंदांनंतर बटण पूर्ववत करा
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove('copied');
                }, 1500);

            })
            .catch(err => {
                console.error('टेक्स्ट कॉपी करताना त्रुटी आली: ', err);
                alert('कॉपी करण्यात अपयश आले. ब्राउझर सेटिंग्ज तपासा किंवा मॅन्युअली कॉपी करा.');
            });
    }
</script>
